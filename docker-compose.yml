version: '3.8'

services:
  geminiweb2api:
    image: lumia1998/geminiweb2api:latest
    container_name: geminiweb2api
    ports:
      - "8000:8000"
    volumes:
      # Persist configuration and logs
      - ./config_data.json:/app/config_data.json
      - ./media_cache:/app/media_cache
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/v1/models')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
